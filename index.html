<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050510" />
  <title>ゲーム一覧</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #06060f;
      --text: #e8ecff;
      --muted: rgba(232, 236, 255, 0.65);
      --card: rgba(12, 18, 40, 0.85);
      --border: rgba(0, 245, 255, 0.2);
      --accent: #00f5ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans JP", sans-serif;
      line-height: 1.5;
    }
    body {
      padding: clamp(1.25rem, 4vw, 2.5rem);
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, #1a0a2e 0%, transparent 55%),
        var(--bg);
    }
    main {
      max-width: 36rem;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      font-weight: 700;
      margin-bottom: 0.35rem;
    }
    .lead {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1.75rem;
    }
    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    a.card {
      display: block;
      padding: 1rem 1.15rem;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      color: inherit;
      text-decoration: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    a.card:hover {
      border-color: rgba(0, 245, 255, 0.45);
      box-shadow: 0 0 24px rgba(0, 245, 255, 0.08);
    }
    a.card strong {
      display: block;
      font-size: 1.05rem;
      margin-bottom: 0.2rem;
      color: var(--accent);
    }
    a.card span.desc {
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>ゲーム一覧</h1>
    <p class="lead">プロジェクト内のゲームへジャンプできます。フォルダにスペースがあると HTML をダブルクリックしても開けないことがあります。そのときはリポジトリ直下の <code style="color:var(--accent)">play-pal-kun.bat</code> をダブルクリックしてください（Python 3 が必要です）。</p>
    <ul>
      <li>
        <a class="card" href="games/20260321_neon-descent/index.html">
          <strong>NEON DESCENT</strong>
          <span class="desc">Canvas シューティング（PWA 対応）</span>
        </a>
      </li>
      <li>
        <a class="card" href="games/20260324_pal-kun-nigero/index.html">
          <strong>パルくんのにげろ！（デモ）</strong>
          <span class="desc">3D 屋上パルクール・矢印パッドで加速・ゾンビから逃げる</span>
        </a>
      </li>
      <li>
        <a class="card" href="games/20260405_work-in-progress/index.html">
          <strong>ペットレスキュー（デモ）</strong>
          <span class="desc">災害からペットを救出しヘリ脱出 · Canvas デモ</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
